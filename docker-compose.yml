services:
  # ── Express API ─────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_ID: ${ADMIN_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GRADIO_SPACE_URL: ${GRADIO_SPACE_URL}
      HF_TOKEN: ${HF_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_TREATMENT_PROMPT: ${GEMINI_TREATMENT_PROMPT:-}
      GEMINI_CAUSES_PROMPT: ${GEMINI_CAUSES_PROMPT:-}
      GEMINI_PREVENTION_PROMPT: ${GEMINI_PREVENTION_PROMPT:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    # expose port to host for debugging; remove in production if not needed
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - veag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React SPA served by nginx ────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Firebase config – baked into the bundle at build time
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
        # Empty → relative URL → nginx proxies /api to the server service
        VITE_API_URL: ""
        VITE_API_BASE_URL: "/api"
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - veag-net

networks:
  veag-net:
    driver: bridge